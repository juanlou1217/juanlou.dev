services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      POSTGRES_URL: ${POSTGRES_URL:-postgresql://postgres:postgres@postgres:5432/juanlou_blog}
      GITHUB_API_TOKEN: ${GITHUB_API_TOKEN:-}
      NEXT_PUBLIC_GISCUS_REPO: ${NEXT_PUBLIC_GISCUS_REPO:-}
      NEXT_PUBLIC_GISCUS_REPOSITORY_ID: ${NEXT_PUBLIC_GISCUS_REPOSITORY_ID:-}
      NEXT_PUBLIC_GISCUS_CATEGORY: ${NEXT_PUBLIC_GISCUS_CATEGORY:-}
      NEXT_PUBLIC_GISCUS_CATEGORY_ID: ${NEXT_PUBLIC_GISCUS_CATEGORY_ID:-}
      UMAMI_WEBSITE_ID: ${UMAMI_WEBSITE_ID:-}
      UMAMI_SHARE_URL: ${UMAMI_SHARE_URL:-}
      NODE_ENV: production
    restart: unless-stopped
    depends_on:
      - postgres

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-juanlou_blog}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  caddy:
    image: caddy:2.10-alpine
    depends_on:
      - app
    environment:
      SITE_DOMAIN: ${SITE_DOMAIN:-juanlou.top}
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
