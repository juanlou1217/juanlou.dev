<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Global module diagram</title>
  <desc id="desc">A global LoggerModule registered once in AppModule and used across feature modules.</desc>
  <rect width="1200" height="720" fill="#f5f3ff"/>
  <rect x="360" y="80" width="480" height="180" rx="30" fill="#ffffff" stroke="#7c3aed" stroke-width="5"/>
  <text x="600" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="42" font-weight="700" fill="#6d28d9">AppModule</text>
  <text x="600" y="205" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" fill="#5b21b6">imports LoggerModule once</text>
  <circle cx="600" cy="360" r="88" fill="#ede9fe" stroke="#8b5cf6" stroke-width="5"/>
  <text x="600" y="352" text-anchor="middle" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#6d28d9">Global</text>
  <text x="600" y="392" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#6d28d9">LoggerModule</text>
  <rect x="120" y="520" width="250" height="120" rx="22" fill="#fff7ed" stroke="#ea580c" stroke-width="4"/>
  <text x="245" y="592" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#9a3412">ProductModule</text>
  <rect x="475" y="520" width="250" height="120" rx="22" fill="#ecfeff" stroke="#0891b2" stroke-width="4"/>
  <text x="600" y="592" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#0e7490">ShopMonitoring</text>
  <rect x="830" y="520" width="250" height="120" rx="22" fill="#ecfdf5" stroke="#059669" stroke-width="4"/>
  <text x="955" y="592" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#047857">PriceMonitoring</text>
  <path d="M600 260v20" stroke="#7c3aed" stroke-width="8" stroke-linecap="round"/>
  <path d="M600 448v46" stroke="#7c3aed" stroke-width="8" stroke-linecap="round"/>
  <path d="M510 426 310 520" stroke="#7c3aed" stroke-width="7" stroke-linecap="round"/>
  <path d="M690 426 890 520" stroke="#7c3aed" stroke-width="7" stroke-linecap="round"/>
</svg>
