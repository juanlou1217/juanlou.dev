<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Feature module diagram</title>
  <desc id="desc">A NestJS feature module connected to its controller and service.</desc>
  <rect width="1200" height="720" fill="#f7f3eb"/>
  <rect x="150" y="120" width="900" height="480" rx="36" fill="#fffdf8" stroke="#d6c9b6" stroke-width="6"/>
  <text x="600" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="42" font-weight="700" fill="#1f2937">ProductModule</text>
  <text x="600" y="238" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" fill="#6b7280">Feature module structure in NestJS</text>
  <rect x="220" y="310" width="220" height="160" rx="24" fill="#fef3c7" stroke="#f59e0b" stroke-width="4"/>
  <text x="330" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#92400e">Controller</text>
  <text x="330" y="420" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#92400e">Routes</text>
  <rect x="490" y="310" width="220" height="160" rx="24" fill="#dbeafe" stroke="#2563eb" stroke-width="4"/>
  <text x="600" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#1d4ed8">Service</text>
  <text x="600" y="420" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#1d4ed8">Business logic</text>
  <rect x="760" y="310" width="220" height="160" rx="24" fill="#dcfce7" stroke="#16a34a" stroke-width="4"/>
  <text x="870" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#166534">Repository</text>
  <text x="870" y="420" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#166534">Data access</text>
  <path d="M440 390h50" stroke="#9ca3af" stroke-width="8" stroke-linecap="round"/>
  <path d="M710 390h50" stroke="#9ca3af" stroke-width="8" stroke-linecap="round"/>
</svg>
