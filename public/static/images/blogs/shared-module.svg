<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Shared module diagram</title>
  <desc id="desc">A shared LoggerModule imported by multiple NestJS feature modules.</desc>
  <rect width="1200" height="720" fill="#eef6ff"/>
  <rect x="430" y="120" width="340" height="160" rx="28" fill="#ffffff" stroke="#2563eb" stroke-width="5"/>
  <text x="600" y="185" text-anchor="middle" font-family="Arial, sans-serif" font-size="40" font-weight="700" fill="#1d4ed8">LoggerModule</text>
  <text x="600" y="228" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" fill="#475569">Exports LoggerService</text>
  <rect x="100" y="420" width="260" height="150" rx="24" fill="#fff7ed" stroke="#ea580c" stroke-width="4"/>
  <text x="230" y="500" text-anchor="middle" font-family="Arial, sans-serif" font-size="32" font-weight="700" fill="#9a3412">ProductModule</text>
  <rect x="470" y="420" width="260" height="150" rx="24" fill="#f5f3ff" stroke="#7c3aed" stroke-width="4"/>
  <text x="600" y="500" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#6d28d9">ShopMonitoring</text>
  <rect x="840" y="420" width="260" height="150" rx="24" fill="#ecfdf5" stroke="#059669" stroke-width="4"/>
  <text x="970" y="500" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#047857">PriceMonitoring</text>
  <path d="M600 280v60" stroke="#64748b" stroke-width="7" stroke-linecap="round"/>
  <path d="M230 420l310-120" stroke="#64748b" stroke-width="7" stroke-linecap="round"/>
  <path d="M600 420V340" stroke="#64748b" stroke-width="7" stroke-linecap="round"/>
  <path d="M970 420 660 300" stroke="#64748b" stroke-width="7" stroke-linecap="round"/>
</svg>
